<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Interface Monitor</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --user-color: #4b5563; /* Grey */
            
            /* Agent Colors */
            --agent-1-color: #10b981; /* Green */
            --agent-2-color: #ef4444; /* Red */
            --agent-3-color: #3b82f6; /* Blue */
            --agent-4-color: #ec4899; /* Pink */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            cursor: none; /* Hides the mouse cursor */
        }

        #top-bar {
            width: 100%;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 1rem;
            font-size: 2rem;
            font-weight: 600;
            border-bottom: 1px solid #222;
            background: #000;
            z-index: 10;
        }

        .status-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #ef4444; /* Default Red */
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.6);
            transition: all 0.3s ease;
        }

        .status-dot.green {
            background-color: #22c55e;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.6);
        }

        .status-dot.red {
            background-color: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.6);
        }

        #chat-container {
            flex: 1;
            padding: 3rem 4rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            overflow-y: hidden;
            justify-content: flex-end; /* Keep messages at the bottom */
        }

        .message {
            max-width: 80%;
            padding: 1.5rem 2rem;
            border-radius: 20px;
            font-size: 26pt; /* Keep font size nice and large */
            line-height: 1.4;
            word-wrap: break-word;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.4s forwards;
            font-weight: 500;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-color);
            color: #ffffff;
            border-bottom-right-radius: 5px;
        }

        .message.agent {
            align-self: flex-start;
            color: #ffffff;
            border-bottom-left-radius: 5px;
        }

        /* Dynamically apply agent color */
        .message.agent-1 { background-color: var(--agent-1-color); }
        .message.agent-2 { background-color: var(--agent-2-color); }
        .message.agent-3 { background-color: var(--agent-3-color); }
        .message.agent-4 { background-color: var(--agent-4-color); }
        
        /* Fallback if agent ID is unknown */
        .message.agent-0 { background-color: var(--agent-1-color); }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <div id="status" class="status-dot"></div>
        <span id="connection-text">Waiting for connection...</span>
    </div>

    <div id="chat-container">
        <!-- Messages go here -->
    </div>

    <script>
        const statusDot = document.getElementById('status');
        const connText = document.getElementById('connection-text');
        const chatContainer = document.getElementById('chat-container');

        let messageHistory = [];
        let currentAgentId = 1; // Default to 1

        function updateIndicator(color, text) {
            statusDot.className = 'status-dot ' + color;
            connText.innerText = text;
        }

        function addMessage(speaker, text) {
            // Create new message
            const msgEl = document.createElement('div');
            
            if (speaker === 'User') {
                msgEl.className = 'message user';
            } else {
                msgEl.className = `message agent agent-${currentAgentId}`;
            }
            
            msgEl.innerText = text;

            // Add to DOM
            chatContainer.appendChild(msgEl);
            messageHistory.push(msgEl);

            // Keep only the last 6 messages total (3 user + 3 agent)
            if (messageHistory.length > 6) {
                const oldest = messageHistory.shift();
                chatContainer.removeChild(oldest);
            }
        }

        function connect() {
            const wsUrl = `ws://${window.location.hostname || 'localhost'}:8765`;
            const ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                updateIndicator('red', 'System Ready - Lift handset to begin');
            };

            ws.onclose = () => {
                updateIndicator('red', 'Disconnected - Reconnecting...');
                setTimeout(connect, 2000);
            };

            ws.onerror = () => { ws.close(); };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'status') {
                        updateIndicator('red', data.message);
                    } else if (data.type === 'indicator') {
                        updateIndicator(data.color, data.text);
                    } else if (data.type === 'transcript') {
                        addMessage(data.speaker, data.text);
                    } else if (data.type === 'clear_chat') {
                        chatContainer.innerHTML = '';
                        messageHistory = [];
                    } else if (data.type === 'start_session') {
                        currentAgentId = data.agent;
                    }
                } catch (e) {
                    console.error("Error parsing message", e);
                }
            };
        }

        connect();
    </script>
</body>
</html>
